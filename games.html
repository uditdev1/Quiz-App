<!DOCTYPE html>
<html lang="en">

<head>
    <title>Featured Games</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="games-page">

        <div class="games-header">
            <h1 id="welcomeText">Featured Games</h1>
            <button onclick="logout()">Logout</button>
        </div>

        <div class="games-grid">

            <div class="game-card" onclick="location.href='index.html'">
                <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
                <h3>General Quiz</h3>
                <p>Challenge your knowledge</p>
            </div>

            <div class="game-card">
                <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d">
                <h3>Tech Quiz</h3>
                <p>Frontend & backend questions</p>
            </div>

            <div class="game-card">
                <img src="https://images.unsplash.com/photo-1518770660439-4636190af475">
                <h3>Rapid Quiz</h3>
                <p>Fast answer mode</p>
            </div>

            <div class="game-card" onclick="location.href='custom-quiz.html'">
                <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d">
                <h3>Custom Quiz</h3>
                <p>Based on your profile</p>
            </div>

            <div class="game-card" onclick="location.href='profile.html'">
                <img src="https://images.unsplash.com/photo-1517245386807-bb43f82c33c4">
                <h3>Profile</h3>
                <p>Track your activity</p>
            </div>

        </div>

    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user"));

        if (!user) {
            window.location.href = "login.html";
        }

        document.getElementById("welcomeText").innerText =
            `Welcome ${user.name}`;

        function logout() {
            localStorage.removeItem("user");
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
