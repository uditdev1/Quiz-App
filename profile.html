<!DOCTYPE html>
<html lang="en">

<head>
    <title>Profile Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="profile-page">

        <div class="profile-header">
            <h1 id="profileName"></h1>
            <button onclick="logout()">Logout</button>
        </div>

        <div class="stats-grid">

            <div class="stat-card">
                <h2 id="totalQuiz">0</h2>
                <p>Total Quizzes</p>
            </div>

            <div class="stat-card">
                <h2 id="lastScore">0</h2>
                <p>Last Score</p>
            </div>

            <div class="stat-card">
                <h2 id="lastActivity">Today</h2>
                <p>Last Activity</p>
            </div>

            <div class="stat-card">
                <h2 id="lastGame">General Quiz</h2>
                <p>Last Played</p>
            </div>

        </div>

    </div>

    <script src="js/profile.js"></script>

</body>

</html>
