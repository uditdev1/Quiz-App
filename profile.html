<!DOCTYPE html>
<html lang="en">

<head>
    <title>Profile Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- DARK MODE BUTTON -->
    <button id="themeToggle" class="theme-btn">
        🌙 Dark Mode
    </button>

    <div class="profile-page">

        <!-- PROFILE HEADER -->
        <div class="profile-header">

            <div class="profile-info">
                <div class="avatar" id="avatarLetter">U</div>
                <h1 id="profileName"></h1>
            </div>

            <button onclick="logout()">LOGOUT</button>

        </div>

        <!-- STATS GRID -->
        <div class="stats-grid">

            <div class="stat-card">
                <h2 id="lastGame">General Quiz</h2>
                <p>Last Played</p>
            </div>

            <div class="stat-card">
                <h2 id="totalQuiz">0</h2>
                <p>Total Quizzes</p>
            </div>

            <div class="stat-card">
                <h2 id="lastScore">0</h2>
                <p>Last Score</p>
            </div>

            <div class="stat-card">
                <h2 id="lastActivity">Today</h2>
                <p>Last Activity</p>
            </div>

            <div class="stat-card">
                <h2 id="streakCount">0 🔥</h2>
                <p>Daily Streak</p>
            </div>

            <div class="stat-card">
                <h2 id="userBadge">Beginner 🐣</h2>
                <p>Badge</p>
            </div>

        </div>

        <!-- ACTIVITY SECTION -->
        <div class="activity-section">
            <h2>Recent Activity</h2>
            <div id="activityList"></div>
        </div>

        <!-- CHART SECTION -->
        <div class="chart-section">
            <h2>Performance Chart</h2>
            <canvas id="scoreChart"></canvas>
        </div>

    </div>

    <!-- JS FILES -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/profile.js"></script>

</body>

</html>
